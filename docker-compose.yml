services:
  postgres:
    image: postgres:18
    container_name: postgres
    restart: always
    #    network_mode: host
    networks:
      fusing_network:
    ports:
      - "5432:5432"
    env_file: ".env"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - /run/media/peter/genetics/algotrader/postgres:/var/lib/postgresql
      - ./config/postgresql.conf:/etc/postgresql/postgresql.conf
  #    deploy:
  #      resources:
  #        limits:
  #          cpus: "4.0"
  #          memory: "1G"
  #        reservations:
  #          cpus: "0.5"
  #          memory: "100M"



networks:
  fusing_network:
    name: fusing_network

